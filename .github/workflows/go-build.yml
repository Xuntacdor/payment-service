name: Go CI/CD

# Workflow sẽ tự động chạy khi có sự kiện Push hoặc Tạo Pull Request vào nhánh 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu mới nhất

    steps:
    # Bước 1: Checkout mã nguồn từ GitHub xuống môi trường chạy
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường ngôn ngữ Go
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25' # Thay đổi phiên bản Go phù hợp với dự án của bạn

    # Bước 3: Tải các thư viện (caching được hỗ trợ mặc định ở bản setup-go mới)
    - name: Install dependencies
      run: go mod download

    # Bước 4: Chạy Unit Tests
    - name: Run Tests
      run: go test -v ./...

    # Bước 5: Build ứng dụng (Kiểm tra xem code có build được không)
    - name: Build
      run: go build -v ./...
