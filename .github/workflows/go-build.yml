name: Go CI/CD

# Workflow sẽ tự động chạy khi có sự kiện Push hoặc Tạo Pull Request vào nhánh 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Khai báo biến môi trường toàn cục
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true # Lưu ý: Node 24 hiện chưa phổ biến cho Runner, nên dùng Node 20 hoặc 22 để ổn định

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Cập nhật phiên bản Go ổn định nhất bạn đang dùng
          cache: true        # Bật tính năng cache tự động để chạy nhanh hơn

      # Bước 3: Tải các thư viện
      - name: Install dependencies
        run: go mod download

      # Bước 4: Chạy Unit Tests
      - name: Run Tests
        run: go test -v ./...

      # Bước 5: Build ứng dụng
      - name: Build
        run: go build -v ./...